services:
  # --- PostgreSQL ---
  db:
    image: postgres:17-alpine
    # container_name: education-db
    networks:
      ai-net:
        aliases:
          - db  # これを明示することで backend が "db" でアクセス可能になる
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s

  # --- Go バックエンド API ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # container_name: education-backend
    networks:
      - ai-net
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}  # ← これが超重要！
      - DB_PORT=${DB_PORT}
    volumes:
      - ./images:/home/kaito/ai-education/images  # 画像保存用のボリュームマウント
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 300s

  # --- Bun + Hono (BFF / Frontend) ---
  frontend:
    build: ./frontend
    image: localhost/ai-education_frontend:latest
    # container_name: education-frontend
    networks:
      - ai-net
    ports:
      - "3000:3000"
    command: ["bun", "run", "dev"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy

  # --- SurrealDB ---
  surrealdb:
    image: surrealdb/surrealdb:latest
    # container_name: education-surrealdb
    networks:
      - ai-net
    command: start --log trace --user ${SURREALDB_USER:-root} --pass ${SURREALDB_PASS:-root} rocksdb:/data/database.db
    ports:
      - "8005:8000"
    volumes:
      - ./surreal_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  
networks:
  ai-net:
    driver: bridge